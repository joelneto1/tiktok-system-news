# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# sys.path prepend — so "app" package is importable
prepend_sys_path = .

# template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# The URL is overridden in env.py to read from app.config.settings,
# but we keep a default here for the alembic CLI fallback.
sqlalchemy.url = postgresql+asyncpg://app:password@localhost:5432/newstiktok

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
