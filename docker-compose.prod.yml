services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - coolify-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: celery -A app.queue.celery_app worker -Q pipeline --loglevel=info --pool=solo --concurrency=1
    working_dir: /app/backend
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - coolify-db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  coolify-db:
    external: true
    name: lcog0wgcwsws0okwoc8kck4s_coolify-network

volumes:
  redis-data:
